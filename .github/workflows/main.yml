name: Build Kernel 12-5.10 (Payel + SuSFS)

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: 'Kernel Name (e.g., Payel-Kernel)'
        required: true
        default: 'Payel-Kernel'

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Zixine KernelSU Repository
        uses: actions/checkout@v4
        with:
          path: zixine-kernelsu

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Build Dependencies & Repo Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libssl-dev libfl-dev curl zip unzip lld llvm
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Sync GKI Manifest
        run: |
          mkdir -p gki
          cd gki
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: Update KernelSU & Rama Source
        working-directory: gki/common
        run: |
          git remote add garnet-playground https://github.com/garnet-playground/android_kernel_xiaomi_sm7435.git
          git fetch --depth=1 garnet-playground lineage-23
          git reset --hard garnet-playground/lineage-23

          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          rm -rf sus/.git
          susfs=sus/kernel_patches
          cp -r $susfs/fs . && cp -r $susfs/include . && cp -r $susfs/50_add_susfs_in_gki-android12-5.10.patch .
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch

      - name: Apply Critical Fixes (KSU + Xiaomi + Bootloop)
        working-directory: gki/common
        run: |
          echo "🔧 1. Fixing SuSFS header (cred)..."
          sed -i '1i #include <linux/cred.h>' include/linux/susfs_def.h

          echo "🔧 2. Fixing Stack Protector (Wajib untuk Xiaomi Anti-Bootloop)..."
          sed -i '/config STACKPROTECTOR_PER_TASK/{n;s/def_bool y/bool "Stack Protector per task"\n\tdefault y/;}' arch/arm64/Kconfig

          echo "🔧 3. Fixing Xiaomi Module Compat (Symbol Version)..."
          sed -i '/pr_warn.*disagrees about version of symbol.*/,+1 s/.*/return 1;/' kernel/module.c
          sed -i '/^static int drm_atomic_check_valid_clones/,/^}/d' drivers/gpu/drm/drm_atomic_helper.c
          sed -i '/ret = drm_atomic_check_valid_clones/,/return ret;/d' drivers/gpu/drm/drm_atomic_helper.c

          echo "🧹 4. Cleaning Build Config..."
          sed -i 's/check_defconfig//' build.config.gki

          echo "🔧 5. Fixing Unused Label in bootconfig.c..."
          sed -i 's/skip:;/\/\/ skip:;/g' fs/proc/bootconfig.c

      - name: Configure Kernel (Safe Mode)
        working-directory: gki/common
        run: |
          TARGET_CONFIG="arch/arm64/configs/gki_defconfig"

          echo "⚙️ Injecting Configuration (Safe Mode)..."

          cat >> $TARGET_CONFIG <<EOF
          CONFIG_KSU=y
          CONFIG_KSU_VERSION=10203
          CONFIG_KPM=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_KPROBES_HOOK=n

          # SuSFS Configs
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=y

          # Tuning & Safety
          CONFIG_HZ_300=y
          CONFIG_FS_ENCRYPTION=y
          CONFIG_FS_VERITY=y
          CONFIG_PM_AUTOSLEEP=y
          CONFIG_PM_WAKELOCKS=y

          CONFIG_LOCALVERSION_AUTO=n
          EOF

      - name: Apply Versioning
        working-directory: gki/common
        run: |
          NAME="${{ github.event.inputs.kernel_name }}"
          [ -z "$NAME" ] && NAME="Payel-Kernel-2.6"
          FINAL_TAG="-${NAME}"
          echo "" > scripts/setlocalversion
          if grep -q '^EXTRAVERSION *=' Makefile; then
            sed -i "s/^EXTRAVERSION *=.*/EXTRAVERSION = $FINAL_TAG/" Makefile
          else
            echo "EXTRAVERSION = $FINAL_TAG" >> Makefile
          fi

      - name: Setup Compiler (Clang 18)
        working-directory: gki
        run: |
          mkdir -p prebuilts-master/clang/host/linux-x86

          ACTUAL_VER="clang-r522817"
          ACTUAL_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz"
          EXPECTED_VER="clang-r563880b"

          echo "⬇️ Downloading Clang 18..."
          mkdir -p "prebuilts-master/clang/host/linux-x86/$ACTUAL_VER"
          curl -L "$ACTUAL_URL" | tar -xz -C "prebuilts-master/clang/host/linux-x86/$ACTUAL_VER"

          echo "🔗 Symlinking $EXPECTED_VER -> $ACTUAL_VER..."
          cd prebuilts-master/clang/host/linux-x86
          rm -rf "$EXPECTED_VER"
          ln -s "$ACTUAL_VER" "$EXPECTED_VER"
          echo "✅ Compiler Ready."

      - name: Execute Build (Direct Make)
        working-directory: gki/common
        run: |
          echo "🚀 Starting Direct Make Build (bypass GKI module/KMI checks)..."

          CLANG_DIR="$GITHUB_WORKSPACE/gki/prebuilts-master/clang/host/linux-x86/clang-r522817/bin"
          export PATH="$CLANG_DIR:$PATH"

          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=aarch64-linux-gnu-

          echo "⚙️ Generating defconfig..."
          make O=out gki_defconfig

          echo "📦 Building Image (Image only, skip modules to avoid GKI modules list check)..."
          make O=out -j$(nproc) KCFLAGS="-Wno-error" Image 2>&1 | tee build.log

          echo "✅ Build complete. Checking Image..."
          ls -lh out/arch/arm64/boot/Image || { echo "❌ Image not found!"; exit 1; }

      - name: Prepare Release Artifacts
        id: packaging_setup
        run: |
          BASE_VER=$(make -s kernelversion -C gki/common | tr -d '\n\r')

          BASE_NAME="${{ github.event.inputs.kernel_name }}"
          [ -z "$BASE_NAME" ] && BASE_NAME="Payel"

          TIMESTAMP=$(date +"%Y%m%d")
          REL_TAG="v${TIMESTAMP}"

          ZIP_FILENAME="AK3-${BASE_NAME}-${REL_TAG}-${BASE_VER}-MamboSU.zip"
          echo "ZIP_FILENAME=$ZIP_FILENAME" >> $GITHUB_ENV

      - name: Create AnyKernel3 Zip
        run: |
          echo "📦 Packaging AnyKernel3..."
          git clone https://github.com/zixine/anykernel AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/.gitignore AnyKernel3/README.md

          IMG=$(find gki/common/out -type f -name "Image" | head -n 1)
          if [ -f "$IMG" ]; then
             cp "$IMG" AnyKernel3/
          else
             echo "❌ Image not found!" && exit 1
          fi

          cd AnyKernel3
          zip -r9 "../${{ env.ZIP_FILENAME }}" * -x .git .gitignore

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_FILENAME }}
          path: ${{ env.ZIP_FILENAME }}

      - name: Archive Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-mambo
          path: gki/common/build.log
          if-no-files-found: warn
